name: .NET Tests

on:
  push:
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - ".github/workflows/dotnet-tests.yml"
  pull_request:
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - ".github/workflows/dotnet-tests.yml"
  workflow_dispatch:

concurrency:
  group: dotnet-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore solution
        run: dotnet restore SimCrewOps.sln

      - name: Build solution
        run: dotnet build SimCrewOps.sln --configuration Release --no-restore

      - name: Test scoring
        run: dotnet test SimCrewOps.Scoring.Tests/SimCrewOps.Scoring.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=scoring-tests.trx" --results-directory TestResults

      - name: Test tracking
        run: dotnet test SimCrewOps.Tracking.Tests/SimCrewOps.Tracking.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=tracking-tests.trx" --results-directory TestResults

      - name: Test phase engine
        run: dotnet test SimCrewOps.PhaseEngine.Tests/SimCrewOps.PhaseEngine.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=phase-engine-tests.trx" --results-directory TestResults

      - name: Test runways
        run: dotnet test SimCrewOps.Runways.Tests/SimCrewOps.Runways.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=runways-tests.trx" --results-directory TestResults

      - name: Test runtime
        run: dotnet test SimCrewOps.Runtime.Tests/SimCrewOps.Runtime.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=runtime-tests.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/**/*.trx
          if-no-files-found: ignore
