name: .NET Tests

permissions:
  contents: write

on:
  push:
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.pubxml"
      - "**/*.ps1"
      - "**/*.sln"
      - "**/*.xaml"
      - "packaging/**"
      - ".github/workflows/dotnet-tests.yml"
  pull_request:
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.pubxml"
      - "**/*.ps1"
      - "**/*.sln"
      - "**/*.xaml"
      - "packaging/**"
      - ".github/workflows/dotnet-tests.yml"
  workflow_dispatch:

concurrency:
  group: dotnet-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore solution
        run: dotnet restore SimCrewOps.sln

      - name: Build solution
        run: dotnet build SimCrewOps.sln --configuration Release --no-restore

      - name: Restore WPF shell
        if: matrix.os == 'windows-latest'
        run: dotnet restore SimCrewOps.App.Wpf/SimCrewOps.App.Wpf.csproj

      - name: Build WPF shell
        if: matrix.os == 'windows-latest'
        run: dotnet build SimCrewOps.App.Wpf/SimCrewOps.App.Wpf.csproj --configuration Release --no-restore

      - name: Test scoring
        run: dotnet test SimCrewOps.Scoring.Tests/SimCrewOps.Scoring.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=scoring-tests.trx" --results-directory TestResults

      - name: Test tracking
        run: dotnet test SimCrewOps.Tracking.Tests/SimCrewOps.Tracking.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=tracking-tests.trx" --results-directory TestResults

      - name: Test phase engine
        run: dotnet test SimCrewOps.PhaseEngine.Tests/SimCrewOps.PhaseEngine.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=phase-engine-tests.trx" --results-directory TestResults

      - name: Test runways
        run: dotnet test SimCrewOps.Runways.Tests/SimCrewOps.Runways.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=runways-tests.trx" --results-directory TestResults

      - name: Test runtime
        run: dotnet test SimCrewOps.Runtime.Tests/SimCrewOps.Runtime.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=runtime-tests.trx" --results-directory TestResults

      - name: Test persistence
        run: dotnet test SimCrewOps.Persistence.Tests/SimCrewOps.Persistence.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=persistence-tests.trx" --results-directory TestResults

      - name: Test sync
        run: dotnet test SimCrewOps.Sync.Tests/SimCrewOps.Sync.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=sync-tests.trx" --results-directory TestResults

      - name: Test hosting
        run: dotnet test SimCrewOps.Hosting.Tests/SimCrewOps.Hosting.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=hosting-tests.trx" --results-directory TestResults

      - name: Test simconnect
        run: dotnet test SimCrewOps.SimConnect.Tests/SimCrewOps.SimConnect.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=simconnect-tests.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/**/*.trx
          if-no-files-found: ignore

  publish-windows-alpha:
    name: Publish Windows Alpha
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PACKAGE_VERSION: 2.0.0-alpha.${{ github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore WPF app
        run: dotnet restore SimCrewOps.App.Wpf/SimCrewOps.App.Wpf.csproj -r win-x64

      - name: Publish WPF app
        run: >
          dotnet publish SimCrewOps.App.Wpf/SimCrewOps.App.Wpf.csproj
          --configuration Release
          --no-restore
          -p:PublishProfile=Alpha-win-x64
          -p:Version=${{ env.PACKAGE_VERSION }}
          -p:InformationalVersion=${{ env.PACKAGE_VERSION }}+${{ github.sha }}

      - name: Stage alpha package
        shell: pwsh
        run: >
          ./packaging/windows/prepare-alpha-package.ps1
          -PublishOutputDirectory "SimCrewOps.App.Wpf/artifacts/publish/SimTrackerV2-win-x64"
          -PackageOutputDirectory "artifacts/package/SimTrackerV2-alpha-win-x64"
          -Version "${{ env.PACKAGE_VERSION }}"
          -CommitSha "${{ github.sha }}"

      - name: Archive alpha package
        shell: pwsh
        run: >
          Compress-Archive
          -Path "artifacts/package/SimTrackerV2-alpha-win-x64/*"
          -DestinationPath "artifacts/package/SimTrackerV2-alpha-win-x64.zip"
          -Force

      - name: Upload alpha package
        uses: actions/upload-artifact@v7
        with:
          name: simtracker-alpha-win-x64
          path: |
            artifacts/package/SimTrackerV2-alpha-win-x64.zip
            artifacts/package/SimTrackerV2-alpha-win-x64/**
          if-no-files-found: error

      - name: Publish GitHub Release (rolling alpha)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpha-latest
          name: "SimCrewOps Tracker — Alpha Build"
          body: |
            **Alpha build** — automatically updated on every push to `main`.

            **Version:** `${{ env.PACKAGE_VERSION }}`
            **Commit:** `${{ github.sha }}`

            ### Install
            1. Download `SimCrewOps-Tracker-alpha-win-x64.zip` below
            2. Extract anywhere and run `SimCrewOps.App.Wpf.exe`

            ### Connect your account
            - Open **Settings** tab → click the `simcrewops.com/settings` link → copy your **API Token** → paste it in and Save
            - The **LIVE SYNC ON** badge in the nav bar confirms you're connected
          prerelease: true
          make_latest: false
          files: artifacts/package/SimTrackerV2-alpha-win-x64.zip
          token: ${{ secrets.GITHUB_TOKEN }}
